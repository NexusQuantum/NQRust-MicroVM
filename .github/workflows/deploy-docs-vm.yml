# DEPRECATED: This workflow deploys docs to a self-hosted VM via SSH/rsync.
# Replaced by deploy-docs-pages.yml which deploys to GitHub Pages at microvm.nexusquantum.id.
# Kept for reference only — triggers are disabled.
name: Deploy Docs to VM (Deprecated)

on:
  workflow_dispatch: # manual trigger only — automatic triggers removed

env:
  DOCS_PATH: /var/www/docs

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Build docs
        run: |
          cd docs
          hugo --minify --baseURL "${{ secrets.DOCS_BASE_URL }}"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p ${{ secrets.VM_SSH_PORT || 22 }} -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to VM
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.VM_SSH_PORT || 22 }} -o StrictHostKeyChecking=no" \
            docs/public/ \
            ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:${{ env.DOCS_PATH }}/

      - name: Cleanup
        if: always()
        run: rm -f ~/.ssh/deploy_key
