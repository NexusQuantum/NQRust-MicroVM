# ---------- FAQ ----------
[faq-eyebrow]
other = "FAQ"
[faq-title]
other = "Questions, asked."

[faq-q1]
other = "How is this different from running plain Docker?"
[faq-a1]
other = "Docker shares a kernel between containers. NQRust-MicroVM runs each workload (whether a VM or a Docker container) inside its own Firecracker microVM with its own kernel, CPU, and memory boundary. Container-escape style attacks are structurally impossible, and noisy-neighbor effects largely disappear."

[faq-q2]
other = "Do we need to know Rust to operate it?"
[faq-a2]
other = "No. The Manager, Agent, and Guest Agent are written in Rust because it lets us ship a small, fast, statically-linked binary — but operators interact with the Next.js dashboard and the REST API. You can run the entire platform without touching the source."

[faq-q3]
other = "What hardware does it require?"
[faq-a3]
other = "Any x86_64 Linux box with KVM (Intel VT-x or AMD-V), 4 GB RAM minimum, 20 GB free disk. Ubuntu 22.04 / 24.04 LTS and Debian 11 are the supported distros today. Multi-host clusters add agents to a shared manager."

[faq-q4]
other = "How does the install work?"
[faq-a4]
other = "We ship a single Rust TUI installer (nqr-installer) that walks through KVM checks, networking, PostgreSQL, and systemd services. There's a one-command online flow and a fully-airgapped flow for sites without internet egress."

[faq-q5]
other = "Can we use our existing iSCSI / TrueNAS / SAN?"
[faq-a5]
other = "Yes. The storage layer is pluggable — add a backend from the UI without restarting the manager. Local file, NFS, SMB, iSCSI+LVM, and TrueNAS REST are visible by default; SPDK vhost-user and generic iSCSI passthrough sit behind an advanced disclosure."

[faq-q6]
other = "What about uptime, SLAs, and support?"
[faq-a6]
other = "Support tiers and SLAs are scoped during onboarding based on your fleet size and workload criticality. Every commercial license includes a dedicated Slack channel and a response-time SLA — we're happy to share our internal runbooks and example incident postmortems on request."

[faq-q7]
other = "Do you support airgapped installs?"
[faq-a7]
other = "Yes — the Rust TUI installer ships an offline mode that takes a single transferable binary and provisions everything (KVM, networking, PostgreSQL, systemd) without outbound internet access. Suitable for regulated environments and sites without egress."

