# ---------- FAQ ----------
[faq-eyebrow]
other = "FAQ"
[faq-title]
other = "Pertanyaan, terjawab."

[faq-q1]
other = "Apa bedanya dengan menjalankan Docker biasa?"
[faq-a1]
other = "Docker berbagi kernel antar container. NQRust-MicroVM menjalankan setiap workload (entah VM atau container Docker) di dalam microVM Firecracker tersendiri dengan kernel, CPU, dan batas memori sendiri. Serangan tipe container-escape secara struktural tidak mungkin, dan efek noisy-neighbor sebagian besar hilang."

[faq-q2]
other = "Apakah kami perlu paham Rust untuk mengoperasikannya?"
[faq-a2]
other = "Tidak. Manager, Agent, dan Guest Agent ditulis dalam Rust karena memungkinkan kami mengirim binary kecil, cepat, dan terhubung statis — tapi operator berinteraksi lewat dashboard Next.js dan REST API. Anda bisa menjalankan seluruh platform tanpa menyentuh source code."

[faq-q3]
other = "Hardware apa yang dibutuhkan?"
[faq-a3]
other = "Setiap mesin Linux x86_64 dengan KVM (Intel VT-x atau AMD-V), minimal 4 GB RAM, 20 GB disk kosong. Ubuntu 22.04 / 24.04 LTS dan Debian 11 adalah distro yang didukung saat ini. Cluster multi-host menambahkan agent ke manager bersama."

[faq-q4]
other = "Bagaimana proses install-nya?"
[faq-a4]
other = "Kami mengirim satu installer TUI berbasis Rust (nqr-installer) yang memandu pengecekan KVM, networking, PostgreSQL, dan service systemd. Tersedia alur online satu perintah dan alur fully-airgapped untuk situs tanpa akses internet keluar."

[faq-q5]
other = "Bisakah kami pakai iSCSI / TrueNAS / SAN yang sudah ada?"
[faq-a5]
other = "Bisa. Lapisan storage bersifat pluggable — tambahkan backend dari UI tanpa restart manager. Local file, NFS, SMB, iSCSI+LVM, dan TrueNAS REST terlihat secara default; SPDK vhost-user dan passthrough iSCSI generik berada di balik disclosure lanjutan."

[faq-q6]
other = "Bagaimana dengan uptime, SLA, dan support?"
[faq-a6]
other = "Tier support dan SLA ditentukan saat onboarding berdasarkan ukuran fleet dan kekritisan workload. Setiap lisensi komersial mencakup channel Slack khusus dan SLA waktu respons — kami senang membagikan runbook internal dan contoh postmortem insiden bila diminta."

[faq-q7]
other = "Apakah Anda mendukung install airgapped?"
[faq-a7]
other = "Ya — installer TUI Rust dilengkapi mode offline yang mengambil satu binary transferable dan menyediakan semuanya (KVM, networking, PostgreSQL, systemd) tanpa akses internet keluar. Cocok untuk lingkungan teregulasi dan situs tanpa egress."

