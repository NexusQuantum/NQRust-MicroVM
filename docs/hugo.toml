# Development: Use baseURL = '/' for local development
# Production: Uncomment line below before deploying to GitHub Pages
# baseURL = 'https://microvm.nexusquantum.id/'
baseURL = '/'

defaultContentLanguage = 'en'
defaultContentLanguageInSubdir = false
enableEmoji = true
enableGitInfo = false

[languages]
  [languages.en]
    title = 'NQRust-MicroVM Documentation'
    languageName = 'English'
    languageCode = 'en-us'
    contentDir = 'content'
    weight = 10
  [languages.id]
    title = 'Dokumentasi NQRust-MicroVM'
    languageName = 'Bahasa Indonesia'
    languageCode = 'id'
    contentDir = 'content/id'
    weight = 20

# Hugo Modules
[module]
  [module.hugoVersion]
    extended = true
    min = "0.100.0"
  [[module.imports]]
    path = "github.com/colinwilson/lotusdocs"
    disable = false
  [[module.imports]]
    path = "github.com/gohugoio/hugo-mod-bootstrap-scss/v5"
    disable = false

# Site Description and Configuration
[params]
  description = "Modern Firecracker microVM orchestration platform"

  # Google Fonts
  google_fonts = [
    ["Inter", "300, 400, 600, 700"],
    ["Fira Code", "500, 700"]
  ]

  sans_serif_font = "Inter"
  secondary_font = "Inter"
  mono_font = "Fira Code"

  # Custom Assets
  custom_css = ["css/toc-collapse.css", "css/nqr-orange-theme.css"]
  custom_js = ["js/toc-collapse.js"]

# Lotus Docs Settings
[params.docs]
  title = "NQRust-MicroVM Docs"
  pathName = "docs"
  themeColor = "orange"
  darkMode = true
  prism = true
  prismTheme = "lotusdocs"
  tableOfContents = true
  scrollSpy = true

# Navigation
[params.plausible]
  enable = false

[params.social]
  github = "nexusquantum/NQRust-MicroVM"

# Main Menu (English)
[menu]
  [[menu.primary]]
    name = "Docs"
    url = "/docs"
    weight = 10
  [[menu.primary]]
    name = "API Reference"
    url = "/docs/api-reference/"
    weight = 20

# Markup Configuration
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = 'monokai'
